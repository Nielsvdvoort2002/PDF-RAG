name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Run backend tests on every push / PR ──────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest backend/tests/ -v

  # ── Deploy backend (SAM) + frontend (S3) on merge to main ─────────────────
  deploy:
    name: Deploy to AWS
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC; remove if using access-key auth
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name pdf-rag \
            --region eu-central-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --s3-prefix pdf-rag \
            --image-repositories BackendFunction=${{ secrets.ECR_IMAGE_REPOSITORY }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              GroqApiKey="${{ secrets.GROQ_API_KEY }}" \
              PineconeApiKey="${{ secrets.PINECONE_API_KEY }}" \
              PineconeIndexName="pdf-rag" \
              UploadApiKey="${{ secrets.UPLOAD_API_KEY }}"

      # ── Frontend ────────────────────────────────────────────────────────────

      - name: Get CloudFormation outputs
        id: cfn
        run: |
          STACK=pdf-rag

          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stack-resource \
            --stack-name "$STACK" \
            --logical-resource-id Distribution \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)

          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend to S3
        run: |
          # Long-lived cache for hashed assets (JS/CSS bundles)
          aws s3 sync frontend/dist/ "s3://${{ steps.cfn.outputs.frontend_bucket }}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

          # No-cache for the HTML entry point so users always get the latest shell
          aws s3 cp frontend/dist/index.html \
            "s3://${{ steps.cfn.outputs.frontend_bucket }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cfn.outputs.distribution_id }}" \
            --paths "/*"
